syntax = "proto3";

package govtrust.insights;

service InsightsService {
  rpc LogInsight   (InsightLogRequest) returns (InsightLogResponse);
  rpc GetDashboard (DashboardRequest)  returns (DashboardResponse);
  rpc GetTopErrors (TopErrorsRequest)  returns (TopErrorsResponse);
  rpc GetTrend     (TrendRequest)      returns (TrendResponse);
}

// ---- Log ----

message InsightLogRequest {
  string procedure_id      = 1;
  string session_id        = 2;
  string error_type        = 3;
  string severity          = 4;
  double final_score       = 5;
  string specific_doc_type = 6;
  string dropped_at_step   = 7;
  string device_type       = 8;
  int32  processing_time_ms = 9;
}

message InsightLogResponse {
  bool success = 1;
}

// ---- Dashboard ----

message DashboardRequest {
  int32 days = 1;
}

message DashboardResponse {
  repeated ErrorStat top_errors = 1;
  double avg_score              = 2;
}

// ---- Top Errors ----

message TopErrorsRequest {
  int32 days = 1;
}

message TopErrorsResponse {
  repeated ErrorStat errors = 1;
}

message ErrorStat {
  string error_type = 1;
  int32  count      = 2;
  double avg_score  = 3;
}

// ---- Trend ----

message TrendRequest {
  int32 days = 1;
}

message TrendResponse {
  repeated TrendPoint points = 1;
}

message TrendPoint {
  string date      = 1;
  int32  count     = 2;
  double avg_score = 3;
}
