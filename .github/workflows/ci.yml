name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  rule-engine:
    name: Rule Engine Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - run: pnpm install
      - run: pnpm --filter @govtrust/rule-engine test
      - run: pnpm --filter @govtrust/rule-engine type-check

  api:
    name: NestJS API Tests
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports: ['27017:27017']
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - run: pnpm install
      - run: pnpm --filter @govtrust/api test
        env:
          MONGO_URI: mongodb://localhost:27017/govtrust_test
          REDIS_HOST: localhost
          JWT_SECRET: test-secret

  ai-svc:
    name: FastAPI Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r apps/ai-svc/requirements-dev.txt
      - run: python -m pytest apps/ai-svc/tests/ -v
        env:
          QDRANT_URL: http://localhost:6333
      - run: cd apps/ai-svc && pyrefly check
