version: '3.9'

# ============================================================
# GovTrust AI — 4 service (xem docs/ARCHITECTURE.md)
#
# Luồng:
#   web        → api-gateway : HTTP (:8080)  — cổng public DUY NHẤT
#   api-gateway→ core-svc    : HTTP (:4000)  — proxy + verify JWT
#   core-svc   → ai-svc      : gRPC (:50051) + BullMQ (Redis)
#
# core-svc & ai-svc KHÔNG expose ra ngoài (chỉ nội bộ).
# ============================================================

services:
  # ── Frontend ──────────────────────────────────────────────
  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXT_PUBLIC_APP_NAME=GovTrust AI
    depends_on:
      - api-gateway

  # ── api-gateway (NestJS edge) ─────────────────────────────
  api-gateway:
    build:
      context: ..
      dockerfile: apps/api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - GATEWAY_PORT=8080
      - CORE_SVC_URL=http://core-svc:4000
      - WEB_ORIGIN=http://localhost:3000
    env_file:
      - ../.env
    depends_on:
      - core-svc

  # ── core-svc (NestJS, MongoDB) — internal ────────────────
  core-svc:
    build:
      context: ..
      dockerfile: apps/core-svc/Dockerfile
    expose:
      - "4000"
    environment:
      - API_PORT=4000
      - MONGO_URI=mongodb://mongo:27017/govtrust_business
      - MONGO_DB_NAME=govtrust_business
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AI_SVC_GRPC_URL=ai-svc:50051
    env_file:
      - ../.env
    depends_on:
      - mongo
      - redis
      - ai-svc

  # ── ai-svc (FastAPI/Python gRPC + Qdrant) — internal ─────
  ai-svc:
    build:
      context: ..
      dockerfile: apps/ai-svc/Dockerfile
    expose:
      - "50051"
      - "8000"
    environment:
      - AI_SVC_GRPC_URL=0.0.0.0:50051
      - AI_SVC_PORT=8000
      # Trỏ Qdrant remote đã seed 875 chunk (QDRANT_API_KEY nạp từ ../.env).
      # Đổi về http://qdrant:6333 nếu muốn dùng Qdrant nội bộ (cần ingest trước).
      - QDRANT_URL=http://45.130.164.249:6333
      - QDRANT_COLLECTION=legal_chunks
      - QDRANT_VECTOR_NAME=dense
      - QDRANT_VECTOR_SIZE=768
      - QDRANT_INGEST_ON_STARTUP=false
      - EMBEDDING_PROVIDER=local
      - EMBEDDING_MODEL=keepitreal/vietnamese-sbert
      - EMBEDDING_DIMENSIONS=768
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LEGAL_CHUNKS_DIR=/app/data/legal-sources/chunks
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    env_file:
      - ../.env
    depends_on:
      - qdrant
      - redis

  # ── Infrastructure ────────────────────────────────────────
  mongo:
    image: mongo:7
    ports:
      - "27019:27017"
    volumes:
      - mongo-data:/data/db
      - ./mongo/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

volumes:
  mongo-data:
  redis-data:
  qdrant-data:
  huggingface-cache:
