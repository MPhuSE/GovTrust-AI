events {
  worker_connections 1024;
}

# Tùy chọn: nginx chỉ lo TLS/static khi cần. Mọi routing API do api-gateway xử lý.
# Stack mặc định (docker-compose) KHÔNG dùng nginx — web gọi thẳng api-gateway:8080.
http {
  upstream web {
    server web:3000;
  }
  upstream gateway {
    server api-gateway:8080;
  }

  server {
    listen 80;
    server_name localhost;

    location / {
      proxy_pass http://web;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # API public đi qua api-gateway (verify JWT + proxy → core-svc)
    location /api/ {
      proxy_pass http://gateway/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      client_max_body_size 10M;
    }
  }
}
