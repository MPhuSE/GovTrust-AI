events {
  worker_connections 1024;
}

http {
  upstream web {
    server web:3000;
  }

  upstream api {
    server api:4000;
  }

  upstream ai_gateway {
    server ai-gateway:8000;
  }

  server {
    listen 80;
    server_name localhost;

    location / {
      proxy_pass http://web;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
      proxy_pass http://api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      client_max_body_size 10M;
    }

    location /ai/ {
      proxy_pass http://ai_gateway/;
      proxy_set_header Host $host;
    }
  }
}
