# ============================================================
# GovTrust AI — PRODUCTION (EC2 t3.small, deploy qua nginx)
#
# Cổng public DUY NHẤT = nginx :80
#   /gw/*  → api-gateway (strip /gw) → core-svc → ai-svc(gRPC)/redis
#   /*     → web (Next.js; gồm route server-side /api/smartvoice/*)
#
# Mongo = Atlas remote, Qdrant = remote, LLM = remote  → KHÔNG chạy local.
# Mọi secret + URL remote nạp từ ../.env (env_file).
#
# Chạy:  docker compose -f docker-compose.prod.yml up -d --build
# ============================================================

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - web
      - api-gateway
    restart: unless-stopped
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
      args:
        # Baked vào bundle lúc build — trỏ về chính nginx qua prefix /gw (same-origin).
        NEXT_PUBLIC_API_URL: https://govtrust.site/gw
        NEXT_PUBLIC_APP_NAME: GovTrust AI
    expose:
      - "3000"
    restart: unless-stopped

  api-gateway:
    build:
      context: ..
      dockerfile: apps/api-gateway/Dockerfile
    expose:
      - "8080"
    environment:
      - GATEWAY_PORT=8080
      - CORE_SVC_URL=http://core-svc:4000
      # CORS: nginx same-origin nên WEB_ORIGIN = host public.
      - WEB_ORIGIN=${WEB_ORIGIN:-*}
    env_file:
      - ../.env
    depends_on:
      - core-svc
    restart: unless-stopped

  core-svc:
    build:
      context: ..
      dockerfile: apps/core-svc/Dockerfile
    expose:
      - "4000"
    environment:
      - API_PORT=4000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AI_SVC_GRPC_URL=ai-svc:50051
      # MONGO_URI + MONGO_DB_NAME lấy từ ../.env (Atlas) — KHÔNG override ở đây.
    env_file:
      - ../.env
    depends_on:
      - redis
      - ai-svc
    restart: unless-stopped

  ai-svc:
    build:
      context: ..
      dockerfile: apps/ai-svc/Dockerfile
    expose:
      - "50051"
      - "8000"
    command: >
      sh -c "python -m app.grpc_entry 2>/dev/null ||
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      - AI_SVC_GRPC_URL=0.0.0.0:50051
      - AI_SVC_PORT=8000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LEGAL_CHUNKS_DIR=/app/data/legal-sources/chunks
      # QDRANT_URL / EMBEDDING_* / LLM_* lấy từ ../.env (remote) — KHÔNG override.
    env_file:
      - ../.env
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
  huggingface-cache:
